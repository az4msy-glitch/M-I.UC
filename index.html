<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div id="upper-container">
            <h1 id="titile">Metric Unit Conversion</h1>
            <input type="text" id="input" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="0">
            <button id="btn" onclick="conversion()">Convert</button>
        </div>
        <div id="lower-container">
            <div class="outer-box">
                <div class="inner-box">
                    <p class="unite">Length (Meter/Feet)</p>
                    <p class="result" id="length"></p>
                </div>
            </div>
            <div class="outer-box">
                <div class="inner-box">
                    <p class="unite">Volume (Liters/Gallons)</p>
                    <p class="result" id="volume"></p>
                </div>
            </div>
            <div class="outer-box">
                <div class="inner-box">
                    <p class="unite">Mass (Kilograms/Pounds)</p>
                    <p class="result" id="mass"></p>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
